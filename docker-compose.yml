name: bid-review

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bid_review
      POSTGRES_USER: bid_review
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bid_review}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bid_review -d bid_review"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./zzsj619:/app/zzsj619:ro
      - upload_data:/app/uploads
    env_file:
      - .env
    environment:
      BID_REVIEW_ENVIRONMENT: local
      BID_REVIEW_DATABASE_URL: postgresql+psycopg://bid_review:${POSTGRES_PASSWORD:-bid_review}@postgres:5432/bid_review
      BID_REVIEW_REDIS_URL: redis://redis:6379/0
      BID_REVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      BID_REVIEW_CELERY_RESULT_BACKEND: redis://redis:6379/1
      BID_REVIEW_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      BID_REVIEW_OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      BID_REVIEW_OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      BID_REVIEW_DATABASE_URL: postgresql+psycopg://bid_review:${POSTGRES_PASSWORD:-bid_review}@postgres:5432/bid_review
      BID_REVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      BID_REVIEW_CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=INFO
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "58080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.6.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  mineru-api:
    image: mineru:latest
    environment:
      MINERU_MODEL_SOURCE: local
    entrypoint: mineru-api
    command:
      --host 0.0.0.0
      --port 8000
    expose:
      - "8000"
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1","2"]
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  upload_data:
